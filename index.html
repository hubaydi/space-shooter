<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Space Shooter 🔫</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    html, body { height: 100%; overscroll-behavior: none; }
    .text-glow { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    .text-glow-pink { text-shadow: 0 0 12px #f0f; }

    /* Canvas keeps 600x800 internal res; CSS scales to fit viewport */
    #game {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Mobile controls ── */
    #mobile-controls {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 30;
    }
    /* Show on touch devices or narrow screens */
    @media (pointer: coarse), (max-width: 820px) {
      #mobile-controls { display: block; }
    }

    .mc-btn {
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0ff;
      background: rgba(0, 20, 40, 0.45);
      border: 2px solid rgba(0, 255, 255, 0.55);
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(0,255,255,0.35), inset 0 0 10px rgba(0,255,255,0.2);
      text-shadow: 0 0 8px #0ff;
      backdrop-filter: blur(2px);
      transition: background .08s, box-shadow .08s, transform .05s;
    }
    .mc-btn.active {
      background: rgba(0, 255, 255, 0.35);
      box-shadow: 0 0 22px rgba(0,255,255,0.7), inset 0 0 14px rgba(0,255,255,0.5);
      transform: scale(0.94);
    }
    .mc-fire {
      color: #ff0;
      border-color: rgba(255,255,0,0.6);
      box-shadow: 0 0 16px rgba(255,255,0,0.4), inset 0 0 12px rgba(255,255,0,0.2);
      text-shadow: 0 0 10px #ff0;
      font-weight: bold; letter-spacing: 0.1em;
    }
    .mc-fire.active {
      background: rgba(255,255,0,0.3);
      box-shadow: 0 0 26px rgba(255,255,0,0.8), inset 0 0 16px rgba(255,255,0,0.5);
    }
    .mc-pause {
      color: #f0f;
      border-color: rgba(255,0,255,0.55);
      box-shadow: 0 0 12px rgba(255,0,255,0.35);
      text-shadow: 0 0 8px #f0f;
    }
    .mc-pause.active { background: rgba(255,0,255,0.3); }

    /* D-pad cross layout */
    #dpad {
      position: absolute;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(18px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 58px);
      gap: 6px;
    }
    #dpad .mc-btn { width: 58px; height: 58px; font-size: 22px; }
    #dpad-up    { grid-column: 2; grid-row: 1; }
    #dpad-left  { grid-column: 1; grid-row: 2; }
    #dpad-right { grid-column: 3; grid-row: 2; }
    #dpad-down  { grid-column: 2; grid-row: 3; }

    #fire-btn {
      position: absolute;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(24px, env(safe-area-inset-bottom));
      width: 92px; height: 92px;
      font-size: 17px;
    }
    #pause-btn {
      position: absolute;
      right: max(16px, env(safe-area-inset-right));
      top: max(14px, env(safe-area-inset-top));
      width: 46px; height: 46px;
      font-size: 18px;
    }
  </style>
</head>
<body class="bg-[#0a0a1a] m-0 p-0">

  <div id="stage">

    <!-- Score & Wave UI -->
    <div id="ui" class="absolute top-4 left-1/2 -translate-x-1/2 text-center pointer-events-none z-10">
      <div id="score" class="text-cyan-400 text-3xl sm:text-5xl font-bold tracking-wider">0</div>
      <div id="wave" class="text-fuchsia-500 text-xs sm:text-sm tracking-[0.3em] uppercase mt-1">Wave 1</div>
      <div id="highscore-display" class="text-cyan-400/40 text-xs mt-1 hidden">
        Best: <span id="highscore-text">0</span>
      </div>
      <!-- Active power-ups sit under the score -->
      <div id="powerups" class="flex gap-2 justify-center mt-2 min-h-[24px]"></div>
    </div>

    <!-- Lives (top-left) -->
    <div id="lives" class="absolute top-4 left-4 flex gap-1.5 pointer-events-none z-10"></div>

    <!-- Overlay messages (start screen / game over / pause) -->
    <div id="overlay" class="absolute inset-0 flex justify-center items-center pointer-events-none z-20 px-4">
      <div id="msg" class="text-white text-center"></div>
    </div>

    <!-- Game canvas -->
    <canvas id="game" class="border-2 border-[#2a2a4a] rounded shadow-[0_0_30px_rgba(0,255,255,0.08)] touch-none select-none"></canvas>

    <!-- Mobile on-screen controls -->
    <div id="mobile-controls">
      <div id="dpad">
        <button id="dpad-up"    class="mc-btn" aria-label="Up">▲</button>
        <button id="dpad-left"  class="mc-btn" aria-label="Left">◀</button>
        <button id="dpad-right" class="mc-btn" aria-label="Right">▶</button>
        <button id="dpad-down"  class="mc-btn" aria-label="Down">▼</button>
      </div>
      <button id="fire-btn" class="mc-btn mc-fire" aria-label="Fire">FIRE</button>
      <button id="pause-btn" class="mc-btn mc-pause" aria-label="Pause">II</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
